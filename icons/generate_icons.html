<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body>
<p style="font-family:sans-serif;padding:10px">
  Right-click each image and <b>Save image as...</b> using the filename shown beneath it.
  Save all four files into the <code>icons/</code> folder.
</p>
<script>
const sizes = [16, 32, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, "#0071e3");
  grad.addColorStop(1, "#34aadc");
  ctx.fillStyle = grad;

  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  const pad  = size * 0.18;
  const gap  = size * 0.08;
  const cell = (size - 2 * pad - gap) / 2;
  ctx.fillStyle   = "white";
  ctx.globalAlpha = 0.95;

  [[0,0],[1,0],[0,1],[1,1]].forEach(([col, row]) => {
    const x  = pad + col * (cell + gap);
    const y  = pad + row * (cell + gap);
    const cr = Math.max(1, cell * 0.18);
    ctx.beginPath();
    ctx.moveTo(x + cr, y); ctx.lineTo(x + cell - cr, y);
    ctx.quadraticCurveTo(x + cell, y, x + cell, y + cr);
    ctx.lineTo(x + cell, y + cell - cr);
    ctx.quadraticCurveTo(x + cell, y + cell, x + cell - cr, y + cell);
    ctx.lineTo(x + cr, y + cell);
    ctx.quadraticCurveTo(x, y + cell, x, y + cell - cr);
    ctx.lineTo(x, y + cr);
    ctx.quadraticCurveTo(x, y, x + cr, y);
    ctx.closePath();
    ctx.fill();
  });

  const img   = document.createElement("img");
  img.src     = canvas.toDataURL("image/png");
  img.style   = "margin:8px;border:1px solid #ccc;image-rendering:pixelated";

  const label = document.createElement("p");
  label.style = "font-family:sans-serif;font-size:12px;margin:0 8px 20px";
  label.textContent = "Save as: icon" + size + ".png";

  document.body.appendChild(img);
  document.body.appendChild(label);
});
</script>
</body>
</html>
